<!DOCTYPE html>
<html lang="en-US" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Publications · VGI Lab @ Korea University</title>
  <link rel="icon" href="/images/logo/ver2/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="stylesheet" href="/styles/publications.css">
</head>
<body data-page="publications">

  <div id="nav-mount"></div>

  <header class="hero" id="top">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1 class="wordmark">Publications<span class="dot">.</span></h1>
      <div class="wordmark-sub">Conferences · Journals · Patents</div>
    </div>
  </header>

  <div class="tab-bar">
    <div class="container">
      <div class="tab-row" id="tabs">
        <button class="tab active" data-filter="selected">Selected</button>
        <button class="tab" data-filter="all">All</button>
        <div class="tab-divider"></div>
        <button class="tab" data-filter="2026">2026</button>
        <button class="tab" data-filter="2025">2025</button>
        <button class="tab" data-filter="2024">2024</button>
        <button class="tab" data-filter="2023">2023</button>
        <button class="tab" data-filter="2022-2014">2022–2014</button>
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="search" type="search" placeholder="Search…">
        </div>
      </div>
    </div>
  </div>

  <section>
    <div class="container">
      
      <div class="pub-group" id="group-conf">
        <div class="group-head">
          <h2>International Conference Papers</h2>
        </div>
        <div class="pub-list" id="list-conf"></div>
      </div>

      <div class="pub-group" id="group-journal">
        <div class="group-head">
          <h2>International Journal Papers</h2>
        </div>
        <div class="pub-list" id="list-journal"></div>
      </div>

      <div class="pub-group" id="group-domestic">
        <div class="group-head">
          <h2>Domestic Conference Papers</h2>
        </div>
        <div class="pub-list" id="list-domestic"></div>
      </div>

      <div class="pub-group" id="group-patent">
        <div class="group-head">
          <h2>Patents</h2>
        </div>
        <div class="pub-list" id="list-patent"></div>
      </div>

      <div class="empty-state hidden" id="empty-state">No items match the current filter.</div>
    </div>
  </section>

  <div id="footer-mount"></div>

  <script src="/assets/publications-data.js"></script>
  <script>
    (() => {
      const PUBS = window.VGI_PUBS; if (!PUBS) return;

      const state = { filter: 'selected', q: '' };

      const tabs = document.querySelectorAll('.tab');
      const searchInput = document.getElementById('search');
      const emptyEl = document.getElementById('empty-state');

      const types = [
        { key: 'conf', label: 'Conferences', listId: 'list-conf', groupId: 'group-conf', unit: 'papers' },
        { key: 'journal', label: 'Journals', listId: 'list-journal', groupId: 'group-journal', unit: 'papers' },
        { key: 'domestic', label: 'Domestic', listId: 'list-domestic', groupId: 'group-domestic', unit: 'papers' },
        { key: 'patent', label: 'Patents', listId: 'list-patent', groupId: 'group-patent', unit: 'patents' },
      ];

      const matchesFilter = (p) => {
        if (state.filter === 'selected' && !p.selected) return false;
        if (['2026','2025','2024','2023'].includes(state.filter) && p.year !== Number(state.filter)) return false;
        if (state.filter === '2022-2014' && (p.year > 2022 || p.year < 2014)) return false;
        if (state.q) {
          const hay = (p.title + ' ' + p.authors + ' ' + p.venue + ' ' + (p.venueFull||'') + ' ' + (p.tag||'') + ' ' + (p.location||'') + ' ' + p.year).toLowerCase();
          if (!hay.includes(state.q)) return false;
        }
        return true;
      };

      const venueClass = (p) => {
        if (p.type === 'journal') return 'journal';
        if (p.type === 'domestic') return 'domestic';
        if (p.type === 'patent') return 'patent';
        return '';
      };
      const tagClass = (tag) => {
        if (!tag) return '';
        const t = tag.toLowerCase();
        if (t === 'award') return 'award';
        if (t === 'registered') return 'registered';
        return '';
      };

      const renderEntry = (p, displayNum) => `
        <article class="pub-entry" id="pub-${p.type}-${p.num}">
          <div class="pub-num">[${displayNum}]</div>
          <div>
            <div class="pub-meta-line">
              ${p.type === 'conf'
                ? `<span class="pub-venue-badge ${venueClass(p)}">${p.venue} ${p.year}</span>`
                : `<span class="pub-venue-badge ${venueClass(p)}">${p.venue}</span><span class="pub-year-badge">${p.year}</span>`}
              ${p.tag ? `<span class="pub-tag ${tagClass(p.tag)}">${p.tag}</span>` : ''}
              ${p.tagNote ? `<span class="pub-tag-note">${p.tagNote}</span>` : ''}
            </div>
            <h3 class="pub-title">${p.title}</h3>
            <div class="pub-authors">${p.authors.replace(/<me>/g, '<span class="me">').replace(/<\/me>/g, '</span>')}</div>
            <span class="pub-loc">${p.venueFull}, ${p.location}</span>
            ${(p.type === 'conf' || p.type === 'journal') ? `
            <div class="pub-links">
              ${p.paper
                ? `<a href="${p.paper}" target="_blank" rel="noopener">Paper <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg></a>`
                : `<span class="tbu">Paper · TBU</span>`}
              ${p.code
                ? `<a href="${p.code}" target="_blank" rel="noopener">Code <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg></a>`
                : ''}
              ${p.project
                ? `<a href="${p.project}" target="_blank" rel="noopener">Project <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17 17 7M9 7h8v8"/></svg></a>`
                : ''}
            </div>` : ''}
          </div>
        </article>`;

      const render = () => {
        let anyVisible = false;
        types.forEach(t => {
          const list = document.getElementById(t.listId);
          const group = document.getElementById(t.groupId);
          const filtered = PUBS.filter(p => p.type === t.key && matchesFilter(p));
          if (filtered.length === 0) {
            group.classList.add('empty');
            list.innerHTML = '';
          } else {
            group.classList.remove('empty');

            const N = filtered.length;
            list.innerHTML = filtered.map((p, i) => renderEntry(p, N - i)).join('');
            anyVisible = true;
          }
        });
        emptyEl.classList.toggle('hidden', anyVisible);
      };

      tabs.forEach(t => t.addEventListener('click', () => {
        state.filter = t.dataset.filter;
        tabs.forEach(x => x.classList.toggle('active', x === t));
        render();
      }));
      searchInput.addEventListener('input', e => { state.q = e.target.value.trim().toLowerCase(); render(); });

      const GROUP_HASHES = new Set(['#group-conf', '#group-journal', '#group-domestic', '#group-patent']);

      const scrollOffset = () => {
        const navEl = document.getElementById('nav');
        const barEl = document.querySelector('.tab-bar');
        return (navEl?.offsetHeight || 60) + (barEl?.offsetHeight || 56) + 12;
      };
      const scrollToHash = (hash) => {
        
        requestAnimationFrame(() => requestAnimationFrame(() => {
          const target = document.querySelector(hash);
          if (!target) return;
          const y = target.getBoundingClientRect().top + window.scrollY - scrollOffset();
          window.scrollTo({ top: y, behavior: 'smooth' });
        }));
      };
      const goToGroup = (hash) => {
        if (!GROUP_HASHES.has(hash)) return false;
        state.filter = 'all';
        tabs.forEach(x => x.classList.toggle('active', x.dataset.filter === 'all'));
        render();
        scrollToHash(hash);
        return true;
      };

      document.querySelectorAll('a[href^="#group-"], a[href*="publications.html#group-"]').forEach(a => {
        a.addEventListener('click', (e) => {
          const href = a.getAttribute('href');
          const hash = href.includes('#') ? '#' + href.split('#')[1] : '';
          if (goToGroup(hash)) {
            e.preventDefault();
            history.replaceState(null, '', hash);
            
            const navItem = a.closest('.nav-item');
            if (navItem) {
              navItem.classList.add('menu-dismissed');
              a.blur();
              const onLeave = () => { navItem.classList.remove('menu-dismissed'); navItem.removeEventListener('mouseleave', onLeave); };
              navItem.addEventListener('mouseleave', onLeave);
            }
          }
        });
      });

      
      
      const initialHash = location.hash;
      const arrivingViaHash = GROUP_HASHES.has(initialHash);
      if (arrivingViaHash) {
        if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
        state.filter = 'all';
        tabs.forEach(x => x.classList.toggle('active', x.dataset.filter === 'all'));
      }

      render();

      if (arrivingViaHash) scrollToHash(initialHash);
    })();
  </script>
  <script src="/assets/site.js"></script>
</body>
</html>
