<!DOCTYPE html>
<html lang="en-US" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VGI @ KU </title>
  <link rel="icon" href="/images/logo/ver2/logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/site.css">
  <link rel="stylesheet" href="/styles/gallery.css">
</head>
<body data-page="gallery">

  <div id="nav-mount"></div>

  <header class="hero" id="top">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1 class="wordmark">Gallery<span class="dot">.</span></h1>
      <div class="wordmark-sub">Conferences · Lab Moments</div>
    </div>
  </header>

  <div class="tab-bar">
    <div class="container">
      <div class="tab-row" id="tabs">
        <button class="tab active" data-filter="all">All</button>
        <div class="tab-divider"></div>
        <button class="tab" data-filter="2026">2026</button>
        <button class="tab" data-filter="2025">2025</button>
        <button class="tab" data-filter="2024">2024</button>
        <button class="tab" data-filter="2023">2023</button>
      </div>
    </div>
  </div>

  <section class="gal">
    <div class="container" id="years"></div>
  </section>

  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer">
    <button class="lb-prev" id="lb-prev" aria-label="Previous photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <img class="lb-img" id="lb-img" alt="">
    <button class="lb-next" id="lb-next" aria-label="Next photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
    </button>
    <button class="lb-close" id="lb-close" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <div class="lb-caption" id="lb-caption"></div>
  </div>

  <div id="footer-mount"></div>

  <script>
    // Add a new event at the top. Drop photos into /images/gallery/ and list each path here.
    const EVENTS = [
      { id: 'seminar-2026',  name: 'Seminar',        year: 2026, location: 'KU VGI Lab', kind: 'Lab',
        photos: ['/images/gallery/2026/seminar.jpeg', '/images/gallery/2026/seminar2.jpeg'] },

      { id: 'cvpr-2026',     name: 'CVPR 2026',      year: 2026, location: 'Denver',     kind: 'Conference',
        photos: ['/images/gallery/2026/CVPR1.jpeg', '/images/gallery/2026/CVPR2.jpg',
                 '/images/gallery/2026/CVPR3.jpg'] },

      { id: 'iclr-2026',     name: 'ICLR 2026',      year: 2026, location: 'Brazil',     kind: 'Conference',
        photos: ['/images/gallery/2026/ICLR.jpg'] },

      { id: 'neurips-2025',  name: 'NeurIPS 2025',   year: 2025, location: 'San Diego',  kind: 'Conference',
        photos: ['/images/gallery/2025/NeurIPS1.jpeg', '/images/gallery/2025/NeurIPS2.jpeg'] },
      { id: 'iccv-2025',     name: 'ICCV 2025',      year: 2025, location: 'Honolulu',   kind: 'Conference',
        photos: ['/images/gallery/2025/ICCV4.jpeg', '/images/gallery/2025/ICCV1.jpeg', '/images/gallery/2025/ICCV2.jpeg',
                 '/images/gallery/2025/ICCV3.jpeg', '/images/gallery/2025/ICCV5.jpeg', '/images/gallery/2025/ICCV6.jpeg',
                 '/images/gallery/2025/ICCV7.jpeg'] },
      { id: 'seminar-2025',  name: 'Seminar & HBD',  year: 2025, location: 'KU VGI Lab', kind: 'Lab',
        photos: ['/images/gallery/2025/seminar.jpg'] },
      { id: 'kccv-2025',     name: 'KCCV 2025',      year: 2025, location: 'Korea',      kind: 'Lab'      ,
        photos: ['/images/gallery/2025/KCCV.jpg', '/images/gallery/2025/KCCV2.jpg'] },
      { id: 'icml-2025',     name: 'ICML 2025',      year: 2025, location: 'Vancouver',  kind: 'Conference',
        photos: ['/images/gallery/2025/ICML.jpg', '/images/gallery/2025/ICML2.jpg', '/images/gallery/2025/ICML3.jpg'] },
      { id: 'cvpr-2025',     name: 'CVPR 2025',      year: 2025, location: 'Nashville',  kind: 'Conference',
        photos: ['/images/gallery/2025/CVPR.jpg', '/images/gallery/2025/CVPR2.jpg', '/images/gallery/2025/CVPR3.jpg', '/images/gallery/2025/CVPR4.jpg'] },

      { id: 'eccv-2024',     name: 'ECCV 2024',      year: 2024, location: 'Milano',     kind: 'Conference',
        photos: ['/images/gallery/2024/ECCV.png', '/images/gallery/2024/ECCV2.jpg', '/images/gallery/2024/ECCV3.jpg'] },
      { id: 'kccv-2024',     name: 'KCCV 2024',      year: 2024, location: 'Korea',      kind: 'Lab'      ,
        photos: ['/images/gallery/2024/KCCV.JPG', '/images/gallery/2024/KCCV2.png'] },
      { id: 'cvpr-2024',     name: 'CVPR 2024',      year: 2024, location: 'Seattle',    kind: 'Conference',
        photos: ['/images/gallery/2024/CVPR.png', '/images/gallery/2024/CVPR2.png', '/images/gallery/2024/CVPR3.jpg'] },

      { id: 'kccv-2023',     name: 'KCCV 2023',      year: 2023, location: 'Korea',      kind: 'Lab'      ,
        photos: ['/images/gallery/2023/KCCV.png'] },
    ];

    const yearsRoot = document.getElementById('years');

    function renderCard(ev) {
      const multi = ev.photos.length > 1;
      const kindClass = ev.kind === 'Lab' ? 'lab' : 'conf';
      const slides = ev.photos.map((src, i) => `
        <div class="slide${i===0?' active':''}" data-i="${i}" style="background-image:url('${src}');" role="button" aria-label="Open ${ev.name} photo ${i+1}"></div>
      `).join('');
      const dots = multi ? ev.photos.map((_, i) =>
        `<button class="dot${i===0?' active':''}" data-i="${i}" aria-label="Photo ${i+1}"></button>`
      ).join('') : '';
      return `
        <article class="event-card" data-id="${ev.id}">
          <div class="slider" data-current="0" data-count="${ev.photos.length}">
            <div class="slides">${slides}</div>
            ${multi ? `
              <button class="slide-btn prev" aria-label="Previous">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
              </button>
              <button class="slide-btn next" aria-label="Next">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 6 6 6-6 6"/></svg>
              </button>
              <div class="photo-count">1 / ${ev.photos.length}</div>
              <div class="dots">${dots}</div>
            ` : ''}
          </div>
          <div class="event-body">
            <div class="event-name">${ev.name}</div>
            <div class="event-meta">
              <span class="badge ${kindClass}">${ev.kind}</span>
              <span class="sep">·</span>
              <span>${ev.location}</span>
            </div>
          </div>
        </article>`;
    }

    function render(filter) {
      const years = [...new Set(EVENTS.map(e => e.year))].sort((a,b) => b - a);
      const html = years.map(y => {
        const items = EVENTS.filter(e => e.year === y);
        const hidden = (filter !== 'all' && String(y) !== filter);
        return `
          <div class="year-group${hidden?' empty':''}" data-year="${y}">
            <div class="year-head">
              <h2>${y}</h2>
            </div>
            <div class="event-grid">${items.map(renderCard).join('')}</div>
          </div>`;
      }).join('');
      yearsRoot.innerHTML = html;
      wireSliders();
    }

    function wireSliders() {
      document.querySelectorAll('.slider').forEach(slider => {
        const count = parseInt(slider.dataset.count, 10);
        const slides = [...slider.querySelectorAll('.slide')];
        const dots = [...slider.querySelectorAll('.dot')];
        const countEl = slider.querySelector('.photo-count');
        const setIdx = (i) => {
          const idx = ((i % count) + count) % count;
          slider.dataset.current = idx;
          slides.forEach((s, k) => s.classList.toggle('active', k === idx));
          dots.forEach((d, k) => d.classList.toggle('active', k === idx));
          if (countEl) countEl.textContent = `${idx + 1} / ${count}`;
        };
        slider.querySelector('.slide-btn.prev')?.addEventListener('click', (e) => { e.stopPropagation(); setIdx(parseInt(slider.dataset.current,10) - 1); });
        slider.querySelector('.slide-btn.next')?.addEventListener('click', (e) => { e.stopPropagation(); setIdx(parseInt(slider.dataset.current,10) + 1); });
        dots.forEach(d => d.addEventListener('click', (e) => { e.stopPropagation(); setIdx(parseInt(d.dataset.i,10)); }));
        slides.forEach(s => s.addEventListener('click', () => {
          const card = slider.closest('.event-card');
          openLightbox(card.dataset.id, parseInt(s.dataset.i,10));
        }));
      });
    }

    const lb = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCap = document.getElementById('lb-caption');
    let lbState = { event: null, i: 0 };

    function openLightbox(eventId, i) {
      const ev = EVENTS.find(e => e.id === eventId);
      if (!ev) return;
      lbState = { event: ev, i };
      lbImg.src = ev.photos[i];
      lbImg.alt = `${ev.name} — photo ${i+1}`;
      lbCap.textContent = `${ev.name} · ${i+1} / ${ev.photos.length}`;
      lb.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lb.classList.remove('open');
      document.body.style.overflow = '';
    }
    function stepLb(delta) {
      const ev = lbState.event; if (!ev) return;
      const n = ev.photos.length;
      lbState.i = ((lbState.i + delta) % n + n) % n;
      lbImg.src = ev.photos[lbState.i];
      lbImg.alt = `${ev.name} — photo ${lbState.i+1}`;
      lbCap.textContent = `${ev.name} · ${lbState.i+1} / ${n}`;
    }
    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => stepLb(-1));
    document.getElementById('lb-next').addEventListener('click', () => stepLb(1));
    lb.addEventListener('click', (e) => { if (e.target === lb) closeLightbox(); });
    document.addEventListener('keydown', (e) => {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') stepLb(-1);
      else if (e.key === 'ArrowRight') stepLb(1);
    });

    const tabs = document.getElementById('tabs');
    tabs.addEventListener('click', (e) => {
      const t = e.target.closest('.tab'); if (!t) return;
      tabs.querySelectorAll('.tab').forEach(x => x.classList.toggle('active', x === t));
      render(t.dataset.filter);
    });

    render('all');
  </script>
  <script src="/assets/site.js"></script>
</body>
</html>
